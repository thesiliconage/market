<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Dashboard — Silicon Age</title>
  <meta name="description" content="实时追踪标普500、纳斯达克100、沪深300、中证500全球主要指数">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📊</span>
        <div>
          <h1>Market Dashboard</h1>
          <p class="subtitle">全球主要指数 · Global Indices</p>
        </div>
      </div>
      <div class="header-right">
        <div class="update-info">
          <span id="market-state" class="market-state"></span>
          <span id="last-update" class="last-update">加载中...</span>
        </div>
        <button id="refresh-btn" class="refresh-btn" title="刷新数据">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <!-- US Indices -->
    <section class="section">
      <h2 class="section-title">
        <span class="flag">🇺🇸</span> 美股指数
        <span class="section-tag">US Markets</span>
      </h2>
      <div class="cards">
        <div class="card" id="card-GSPC" data-symbol="^GSPC">
          <div class="card-header">
            <div>
              <h3>S&P 500</h3>
              <p class="card-subtitle">标普500</p>
            </div>
            <span class="card-badge">SPX</span>
          </div>
          <div class="card-price">
            <span class="price" id="price-GSPC">—</span>
            <span class="currency" id="currency-GSPC"></span>
          </div>
          <div class="card-change" id="change-GSPC">
            <span class="change-value" id="change-value-GSPC">—</span>
            <span class="change-pct" id="change-pct-GSPC">—</span>
          </div>
          <canvas class="sparkline" id="spark-GSPC" width="300" height="60"></canvas>
          <div class="card-meta">
            <span id="range-GSPC" class="range-info"></span>
            <span id="vol-GSPC" class="vol-info"></span>
          </div>
        </div>

        <div class="card" id="card-NDX" data-symbol="^NDX">
          <div class="card-header">
            <div>
              <h3>NASDAQ 100</h3>
              <p class="card-subtitle">纳斯达克100</p>
            </div>
            <span class="card-badge">NDX</span>
          </div>
          <div class="card-price">
            <span class="price" id="price-NDX">—</span>
            <span class="currency" id="currency-NDX"></span>
          </div>
          <div class="card-change" id="change-NDX">
            <span class="change-value" id="change-value-NDX">—</span>
            <span class="change-pct" id="change-pct-NDX">—</span>
          </div>
          <canvas class="sparkline" id="spark-NDX" width="300" height="60"></canvas>
          <div class="card-meta">
            <span id="range-NDX" class="range-info"></span>
            <span id="vol-NDX" class="vol-info"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- China Indices -->
    <section class="section">
      <h2 class="section-title">
        <span class="flag">🇨🇳</span> A股指数
        <span class="section-tag">China Markets</span>
      </h2>
      <div class="cards">
        <div class="card" id="card-CSI300" data-symbol="000300.SS">
          <div class="card-header">
            <div>
              <h3>沪深300</h3>
              <p class="card-subtitle">CSI 300</p>
            </div>
            <span class="card-badge">000300</span>
          </div>
          <div class="card-price">
            <span class="price" id="price-CSI300">—</span>
            <span class="currency" id="currency-CSI300"></span>
          </div>
          <div class="card-change" id="change-CSI300">
            <span class="change-value" id="change-value-CSI300">—</span>
            <span class="change-pct" id="change-pct-CSI300">—</span>
          </div>
          <canvas class="sparkline" id="spark-CSI300" width="300" height="60"></canvas>
          <div class="card-meta">
            <span id="range-CSI300" class="range-info"></span>
            <span id="vol-CSI300" class="vol-info"></span>
          </div>
        </div>

        <div class="card" id="card-CSI500" data-symbol="000905.SS">
          <div class="card-header">
            <div>
              <h3>中证500</h3>
              <p class="card-subtitle">CSI 500</p>
            </div>
            <span class="card-badge">000905</span>
          </div>
          <div class="card-price">
            <span class="price" id="price-CSI500">—</span>
            <span class="currency" id="currency-CSI500"></span>
          </div>
          <div class="card-change" id="change-CSI500">
            <span class="change-value" id="change-value-CSI500">—</span>
            <span class="change-pct" id="change-pct-CSI500">—</span>
          </div>
          <canvas class="sparkline" id="spark-CSI500" width="300" height="60"></canvas>
          <div class="card-meta">
            <span id="range-CSI500" class="range-info"></span>
            <span id="vol-CSI500" class="vol-info"></span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>数据来源：Yahoo Finance · 每5分钟自动刷新 · 仅供参考，不构成投资建议</p>
    <p class="footer-brand">Silicon Age · <a href="https://thesiliconage.org">thesiliconage.org</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
